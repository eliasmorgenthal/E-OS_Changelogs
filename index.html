<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-OS Changelogs</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:linear-gradient(135deg,#8fd3ff,#2d5bff,#5b1aa8);
  min-height:100vh;

  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

.wrapper{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:40px;
}

.version-box{
  background:rgba(0,0,0,0.35);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:15px;
}

footer{
  margin-top:20px;
}
</style>
</head>

<body>

<div class="wrapper">

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<h1>E-OS</h1>
<p id="title">Change Logs</p>

<!-- IMPORTANT: this is where JSON loads -->
<div id="changelog"></div>

<footer id="footer">© 2026, E-OS Development Team.</footer>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const language = params.get("lan") === "de" ? "de" : "en";

function goBack(){
  let url = "https://eliasmorgenthal.github.io/e-oshomepage/";
  if(language === "de") url += "?lan=de";
  window.location.href = url;
}

async function loadChangelogs(){

  const res = await fetch("changelog.json");
  const changelogs = await res.json();

  const container = document.getElementById("changelog");

  container.innerHTML = changelogs.map(entry => `
    <div class="version-box">
      <h2>${entry.version}</h2>
      <ul>
        ${(entry[language] || entry.en).map(item => `<li>${item}</li>`).join("")}
      </ul>
    </div>
  `).join("");

  document.documentElement.lang = language;

  document.getElementById("backBtn").textContent =
    language === "de" ? "⬅ Zurück" : "⬅ Back";

  document.getElementById("title").textContent =
    language === "de" ? "Änderungsprotokolle" : "Change Logs";
}

loadChangelogs();
</script>

</body>
</html>
