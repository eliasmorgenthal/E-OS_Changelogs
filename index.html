<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-OS Changelogs</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:linear-gradient(135deg,#8fd3ff,#2d5bff,#5b1aa8);
  min-height:100vh;

  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

.wrapper{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:40px;
}

.version-box{
  background:rgba(0,0,0,0.35);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:15px;
}

/* NEW badge */
.badge{
  background:#00ff88;
  color:#000;
  font-size:12px;
  padding:3px 8px;
  border-radius:6px;
  margin-left:10px;
  font-weight:bold;
  vertical-align:middle;
}
</style>
</head>

<body>

<div class="wrapper">

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<h1>E-OS</h1>
<p id="title">Change Logs</p>

<div id="changelog"></div>

<footer id="footer">© 2026, E-OS Development Team.</footer>

</div>

<script>

// Language
const params = new URLSearchParams(window.location.search);
const language = params.get("lan") === "de" ? "de" : "en";

// Back button (keeps language)
function goBack(){
  let url = "https://eliasmorgenthal.github.io/e-oshomepage/";
  if(language === "de") url += "?lan=de";
  window.location.href = url;
}

// UI translation
function applyLanguageUI(){

  document.documentElement.lang = language;

  document.getElementById("title").textContent =
    language === "de" ? "Änderungsprotokolle" : "Change Logs";

  document.getElementById("backBtn").textContent =
    language === "de" ? "⬅ Zurück" : "⬅ Back";
}

// Load changelogs + NEW badge
async function loadChangelogs(){

  try{
    const res = await fetch("changelog.json?v=" + Date.now());
    const changelogs = await res.json();

    // newest first
    changelogs.sort((a, b) =>
      b.version.localeCompare(a.version, undefined, { numeric: true })
    );

    const container = document.getElementById("changelog");

    container.innerHTML = changelogs.map((entry, index) => {

      const isLatest = index === 0;

      return `
        <div class="version-box">
          <h2>
            ${entry.version}
            ${isLatest ? `<span class="badge">NEW</span>` : ""}
          </h2>

          <ul>
            ${(entry[language] || entry.en)
              .map(item => `<li>${item}</li>`)
              .join("")}
          </ul>
        </div>
      `;
    }).join("");

    applyLanguageUI();

  } catch (err){
    console.error(err);
    document.getElementById("changelog").innerHTML =
      "<p>Failed to load changelogs.</p>";
  }
}

loadChangelogs();

</script>

</body>
</html>
