<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-OS Changelogs:</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:linear-gradient(135deg,#8fd3ff,#2d5bff,#5b1aa8);
  min-height:100vh;

  /* Disable text selection */
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

.wrapper{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
  display:flex;
  gap:20px;
}

.content{ flex:2; }

h1{ font-size:40px; }

.version-box{
  background:rgba(0,0,0,0.35);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

.side-panel{
  width:220px;
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:12px;
}

.side-panel button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.game-area{
  margin-top:15px;
  background:rgba(0,0,0,0.3);
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="content">
<h1>E-OS</h1>
<p>Change Logs</p>

<div class="version-box">
<h2>0.0.5e</h2>
<ul>
<li>New Discord Profiles</li>
<li>Bug Fixes</li>
<li>Better Button Layouts</li>
</ul>
</div>

<div class="version-box">
<h2>0.0.42e</h2>
<ul>
<li>Bug Fixes</li>
<li>Small UI Tweaks</li>
</ul>
</div>

<div class="version-box">
<h2>0.0.4e</h2>
<ul>
<li>New Start-up screen</li>
<li>Better Layouts</li>
<li>Integrated Google</li>
</ul>
</div>

<footer>© 2026, E-OS Development Team.</footer>
</div>

<div class="side-panel">
<h3>Mini Games</h3>
<button onclick="loadGame('cookie')">Cookie Clicker</button>

<div id="gameArea" class="game-area">
<p>Select a game</p>
</div>
</div>

</div>

<script>
// Load saved cookies or start at 0
let cookies = localStorage.getItem("cookies") 
  ? parseInt(localStorage.getItem("cookies")) 
  : 0;

function loadGame(game){
  const area = document.getElementById("gameArea");

  if(game === "cookie"){
    area.innerHTML = `
      <h2>Cookie Clicker</h2>
      <p>Cookies: <span id="cookies">${cookies}</span></p>
      <button onclick="addCookie()">Click 🍪</button>
      <br><br>
      <button onclick="resetCookies()">Reset</button>
    `;
  }
}

function addCookie(){
  cookies++;
  localStorage.setItem("cookies", cookies);
  document.getElementById("cookies").innerText = cookies;
}

function resetCookies(){
  cookies = 0;
  localStorage.setItem("cookies", cookies);
  document.getElementById("cookies").innerText = cookies;
}
</script>

</body>
</html>
